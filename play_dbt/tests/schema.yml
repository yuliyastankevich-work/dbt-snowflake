data_tests:
  - name: check_uniprot_parsing
    description: "Check that the number of rows in the parsed UniProt table is equal to the number of rows in the original HGNC table"
    config:
      severity: warn
  - name: check_gene_names_parsing
    description: "Check that the number of rows in the parsed gene names table is equal to the number of all gene_symbols in the original HGNC table"
    config:
      severity: warn