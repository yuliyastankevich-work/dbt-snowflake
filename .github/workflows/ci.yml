name: DBT-Snowflake Pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

env:
    SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT}}
    SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER}}
    SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD}}
    SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE}}
    SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE}}
    SNOWFLAKE_DATABASE_DEV: ${{ secrets.SNOWFLAKE_DATABASE_DEV}}
    SNOWFLAKE_SCHEMA: "CI_PR${{ github.event.number || 'main' }}"



jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
            
            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                python-version: '3.10'
                cache: 'pip'
            
            - name: Install Python Packages and DBT
              run: pip install -r requirements.txt
            
            - name: Test Snowflake Connection
              working-directory: play_dbt
              run: dbt debug --target ci

            - name: Test DBT Project
              working-directory: play_dbt
              run: dbt build --target ci